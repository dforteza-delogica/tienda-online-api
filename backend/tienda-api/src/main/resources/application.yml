# ========== SERVER ==========
server:
  port: 8080

# ========== DATABASE ==========
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shopdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ========== JPA ==========
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  # ========== FLYWAY ==========
  flyway:
    enabled: true
    locations: classpath:db/migration

# ========== SWAGGER ==========
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ========== LOGGING ==========
# Configuración de Logging
logging:
  level:
    root: INFO
    '[com.delogica.tienda_api]': DEBUG
    '[org.springframework]': INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %cyan(%logger{36}) - %msg%n"